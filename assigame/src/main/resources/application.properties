#spring.application.name=assigame

# Fichier local optionnel (secrets) — voir application-local.properties.example
spring.config.import=optional:classpath:application-local.properties

server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dbassigame}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.seed.enabled=true
app.seed.force=false
app.seed.backfill-images=true
app.security.upgrade-plain-passwords=true
app.security.login-max-attempts=10
app.security.login-window-ms=60000

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173}

# JWT — définir via application-local.properties ou variable d'environnement JWT_SECRET
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
