# Blueprint Render — backend Assigamé
# Dashboard : New > Blueprint > connecter le dépôt GitHub

databases:
  - name: assigame-db
    plan: free
    databaseName: dbassigame
    user: assigame

services:
  - type: web
    name: assigame-api
    runtime: docker
    rootDir: assigame
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: assigame-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: SHOW_SQL
        value: false
      - key: APP_SEED_ENABLED
        value: "true"
      - key: APP_SEED_FORCE
        value: "false"
